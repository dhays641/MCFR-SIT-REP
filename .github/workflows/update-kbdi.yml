name: Update KBDI and Burn Authorization

on:
  schedule:
    # Runs daily at 2:00 PM Eastern (18:00 UTC) — after FDACS updates at 1:15 PM
    - cron: '0 18 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Fetch KBDI and Burn Auth data
        run: python3 .github/scripts/fetch_kbdi.py

      - name: Commit and push if data changed
        run: |
          git config user.name "MCFR Auto-Update"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update: KBDI and burn auth $(date +'%Y-%m-%d %H:%M ET')"
          git push
